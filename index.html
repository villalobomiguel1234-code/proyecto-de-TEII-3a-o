<!DOCTYPE html>
<html>
  <head>
    <title>Cubo AR.js Tecnologías Emergentes</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;">
      
     <a-marker type="pattern" url="patrones/marcador_ia.patt">

  <a-entity
    position="0 0.5 0"
    rotation="-250 -180 0">

    <a-entity
        gltf-model="modelos_3D/MiRedNeuronal.glb"
        scale="0.05 0.05 0.05"

        animation__rotar="
            property: rotation;
            from: 0 0 0;
            to: 0 360 0;
            loop: true;
            dur: 30000;
            easing: linear">
    </a-entity>

</a-entity>
</a-marker>

      <a-marker preset="kanji">
        <a-entity gltf-model="modelos/turbina.glb" scale="0.5 0.5 0.5"></a-entity>
      </a-marker>

      <a-marker type="pattern" url="patrones/pattern-reciclaje.patt">
        <a-entity gltf-model="modelos/reciclaje.glb" scale="0.5 0.5 0.5"></a-entity>
      </a-marker>

      <a-marker type="pattern" url="patrones/pattern-robot.patt">
        <a-entity gltf-model="modelos/robot.glb" scale="0.5 0.5 0.5"></a-entity>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
<html>
